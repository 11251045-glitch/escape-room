<!DOCTYPE html>
<html lang="zh-Hant">
<head>
    <meta charset="UTF-8">
    <title>2597 SYSTEM ACCESS</title>
    <style>
        body {
            margin: 0;
            padding: 0;
            background-color: #000;
            color: #0f0;
            font-family: 'Courier New', Courier, monospace;
            overflow: hidden;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
        }

        /* 數碼雨畫布 */
        #matrix {
            position: fixed;
            top: 0;
            left: 0;
            z-index: -1;
        }

        /* 掃描線效果 */
        body::before {
            content: " ";
            display: block;
            position: absolute;
            top: 0; left: 0; bottom: 0; right: 0;
            background: linear-gradient(rgba(18, 16, 16, 0) 50%, rgba(0, 0, 0, 0.25) 50%), linear-gradient(90deg, rgba(255, 0, 0, 0.06), rgba(0, 255, 0, 0.02), rgba(0, 0, 255, 0.06));
            z-index: 2;
            background-size: 100% 2px, 3px 100%;
            pointer-events: none;
        }

        /* 主介面 */
        #ui-container {
            background: rgba(0, 20, 0, 0.85);
            border: 2px solid #0f0;
            padding: 40px;
            text-align: center;
            box-shadow: 0 0 20px #0f0;
            z-index: 10;
            width: 400px;
        }

        h1 {
            font-size: 1.5em;
            margin-bottom: 20px;
            text-shadow: 0 0 10px #0f0;
            letter-spacing: 5px;
        }

        .input-area {
            margin-top: 30px;
        }

        input {
            background: transparent;
            border: 1px solid #0f0;
            color: #0f0;
            font-size: 2em;
            width: 150px;
            text-align: center;
            outline: none;
            padding: 10px;
            box-shadow: inset 0 0 5px #0f0;
        }

        #status {
            margin-top: 20px;
            height: 20px;
            font-weight: bold;
        }

        .glitch {
            animation: glitch 1s linear infinite;
        }

        @keyframes glitch {
            2%, 64% { transform: translate(2px, 0) skew(0deg); }
            4%, 60% { transform: translate(-2px, 0) skew(0deg); }
            62% { transform: translate(0, 0) skew(5deg); }
        }

        .success { color: #fff; text-shadow: 0 0 20px #0f0; border-color: #fff !important; }
    </style>
</head>
<body>

    <canvas id="matrix"></canvas>

    <div id="ui-container">
        <h1 class="glitch">2597 PROTOCOL</h1>
        <p>SECURITY LEVEL: ALPHA-4</p>
        <hr style="border: 0.5px solid #0f0;">
        <div class="input-area">
            <p>INPUT ACCESS CODE:</p>
            <input type="password" id="passcode" maxlength="4" autocomplete="off">
        </div>
        <div id="status">WAITING FOR INPUT...</div>
    </div>

    <script>
        // --- 數碼雨腳本 ---
        const canvas = document.getElementById('matrix');
        const ctx = canvas.getContext('2d');

        canvas.width = window.innerWidth;
        canvas.height = window.innerHeight;

        const nums = "2597"; // 只使用 2597 組成數碼雨
        const fontSize = 16;
        const columns = canvas.width / fontSize;
        const drops = Array(Math.floor(columns)).fill(1);

        function drawMatrix() {
            ctx.fillStyle = "rgba(0, 0, 0, 0.05)";
            ctx.fillRect(0, 0, canvas.width, canvas.height);

            ctx.fillStyle = "#0f0";
            ctx.font = fontSize + "px monospace";

            for (let i = 0; i < drops.length; i++) {
                const text = nums.charAt(Math.floor(Math.random() * nums.length));
                ctx.fillText(text, i * fontSize, drops[i] * fontSize);

                if (drops[i] * fontSize > canvas.height && Math.random() > 0.975) {
                    drops[i] = 0;
                }
                drops[i]++;
            }
        }

        setInterval(drawMatrix, 50);

        // --- 密碼邏輯 ---
        const input = document.getElementById('passcode');
        const status = document.getElementById('status');
        const container = document.getElementById('ui-container');

        input.addEventListener('input', () => {
            if (input.value === '2597') {
                status.innerText = "ACCESS GRANTED - SYSTEM UNLOCKED";
                status.style.color = "#fff";
                input.classList.add('success');
                container.style.boxShadow = "0 0 50px #fff";
                input.disabled = true;
                
                // 觸發解鎖後的特效
                triggerUnlock();
            } else if (input.value.length === 4) {
                status.innerText = "ACCESS DENIED - RETRY";
                status.style.color = "red";
                input.value = "";
                setTimeout(() => {
                    status.innerText = "WAITING FOR INPUT...";
                    status.style.color = "#0f0";
                }, 2000);
            }
        });

        function triggerUnlock() {
            // 這裡可以加入串接其他機關的指令，例如發送 Webhook
            console.log("Unlock signal sent!");
        }

        window.addEventListener('resize', () => {
            canvas.width = window.innerWidth;
            canvas.height = window.innerHeight;
        });
    </script>
</body>
</html>

<!DOCTYPE html>
<html lang="zh-Hant">
<head>
    <meta charset="UTF-8">
    <title>CRITICAL ACCESS</title>
    <style>
        :root {
            --neon: #00ff41;
            --glitch-red: #ff003c;
            --unlock-gold: #ffffff;
        }

        body, html {
            margin: 0; padding: 0; width: 100%; height: 100%;
            background-color: #000; overflow: hidden;
            font-family: 'Segoe UI', 'Courier New', monospace;
        }

        canvas { position: absolute; top: 0; left: 0; z-index: 1; }

        /* 掃描線 & 閃爍特效層 */
        #overlay {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background: linear-gradient(rgba(18, 16, 16, 0) 50%, rgba(0, 0, 0, 0.1) 50%), 
                        linear-gradient(90deg, rgba(255,0,0,0.03), rgba(0,255,0,0.01), rgba(0,0,255,0.03));
            background-size: 100% 3px, 3px 100%;
            pointer-events: none; z-index: 100;
        }

        #main-ui {
            position: relative; z-index: 10;
            display: flex; flex-direction: column; justify-content: center; align-items: center;
            height: 100vh; transition: all 0.5s cubic-bezier(0.175, 0.885, 0.32, 1.275);
        }

        .terminal-box {
            background: rgba(0, 20, 0, 0.9);
            border: 1px solid var(--neon);
            padding: 50px; text-align: center;
            box-shadow: 0 0 20px rgba(0, 255, 65, 0.2);
            position: relative;
        }

        h2 { color: var(--neon); letter-spacing: 8px; margin-bottom: 30px; text-shadow: 0 0 10px var(--neon); }

        .pass-input {
            background: transparent; border: 2px solid var(--neon);
            color: var(--neon); font-size: 3rem; width: 220px;
            text-align: center; outline: none; transition: 0.3s;
            font-family: 'Courier New', Courier, monospace;
        }

        /* 成功動畫元件 */
        #success-screen {
            display: none; position: fixed; top: 50%; left: 50%;
            transform: translate(-50%, -50%); z-index: 50;
            text-align: center; width: 100%;
        }

        .hexagon-container {
            width: 300px; height: 300px; margin: 0 auto;
            position: relative; animation: rotate 10s linear infinite;
        }

        .hexagon {
            position: absolute; width: 100%; height: 100%;
            border: 4px solid var(--unlock-gold);
            clip-path: polygon(25% 0%, 75% 0%, 100% 50%, 75% 100%, 25% 100%, 0% 50%);
            box-shadow: 0 0 50px var(--neon);
            display: flex; justify-content: center; align-items: center;
            background: rgba(0, 255, 65, 0.1);
        }

        .unlock-text {
            color: #fff; font-size: 5rem; font-weight: 900;
            text-shadow: 0 0 30px #fff, 0 0 60px var(--neon);
            animation: pulse 1.5s infinite;
        }

        @keyframes rotate { from { transform: rotate(0deg); } to { transform: rotate(360deg); } }
        @keyframes pulse { 0%, 100% { opacity: 1; transform: scale(1); } 50% { opacity: 0.7; transform: scale(1.1); } }

        /* 解鎖震盪 */
        .shake { animation: shake 0.5s infinite; }
        @keyframes shake {
            0% { transform: translate(1px, 1px) rotate(0deg); }
            20% { transform: translate(-3px, 0px) rotate(1deg); }
            40% { transform: translate(3px, 2px) rotate(-1deg); }
            100% { transform: translate(1px, -1px) rotate(0deg); }
        }
    </style>
</head>
<body>

<div id="overlay"></div>
<canvas id="canvas"></canvas>

<div id="main-ui">
    <div class="terminal-box" id="box">
        <h2 id="header">CORE SYSTEM</h2>
        <input type="text" class="pass-input" id="pass" maxlength="4" placeholder="****" autofocus>
        <p id="hint" style="color: #006622; margin-top: 20px;">SECURITY STATUS: ENCRYPTED</p>
    </div>
</div>

<div id="success-screen">
    <div class="hexagon-container">
        <div class="hexagon"><span class="unlock-text">2597</span></div>
    </div>
    <h1 style="color: #fff; font-size: 3rem; margin-top: 40px; letter-spacing: 15px;">ACCESS GRANTED</h1>
    <p style="color: var(--neon); font-size: 1.2rem;">DECRYPTING CORE DATABASE...</p>
</div>

<script>
    const canvas = document.getElementById('canvas');
    const ctx = canvas.getContext('2d');
    canvas.width = window.innerWidth;
    canvas.height = window.innerHeight;

    let matrixSpeed = 1;
    const fontSize = 18;
    const columns = canvas.width / fontSize;
    const drops = Array(Math.floor(columns)).fill(1);
    const chars = "2597";

    function draw() {
        ctx.fillStyle = "rgba(0, 0, 0, 0.05)";
        ctx.fillRect(0, 0, canvas.width, canvas.height);
        ctx.fillStyle = "#0F0";
        ctx.font = fontSize + "px monospace";

        for (let i = 0; i < drops.length; i++) {
            const text = chars[Math.floor(Math.random() * chars.length)];
            ctx.fillText(text, i * fontSize, drops[i] * fontSize);
            if (drops[i] * fontSize > canvas.height && Math.random() > 0.975) drops[i] = 0;
            drops[i] += matrixSpeed;
        }
    }
    let interval = setInterval(draw, 33);

    // 邏輯控制
    const passInput = document.getElementById('pass');
    const mainUI = document.getElementById('main-ui');
    const successScreen = document.getElementById('success-screen');
    const box = document.getElementById('box');

    passInput.addEventListener('input', (e) => {
        if (e.target.value === '2597') {
            triggerSuccess();
        }
    });

    function triggerSuccess() {
        // 1. UI 消失與震盪
        passInput.disabled = true;
        box.classList.add('shake');
        box.style.borderColor = "#fff";
        box.style.boxShadow = "0 0 100px #fff";
        
        // 2. 數碼雨加速
        matrixSpeed = 10;
        
        setTimeout(() => {
            mainUI.style.opacity = '0';
            mainUI.style.transform = 'scale(0.5)';
            
            setTimeout(() => {
                mainUI.style.display = 'none';
                successScreen.style.display = 'block';
                document.body.style.backgroundColor = '#001100';
                
                // 3. 終極背景變化
                ctx.fillStyle = "#fff";
                canvas.style.filter = "blur(1px) contrast(2)";
                
                // 模擬系統「解鎖」聲響效果（如需要可加 Audio）
                console.log("SYSTEM UNLOCKED");
            }, 600);
        }, 1000);
    }

    window.onresize = () => {
        canvas.width = window.innerWidth;
        canvas.height = window.innerHeight;
    }
</script>

</body>
</html>

<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>TERMINAL: MOBILE_READY</title>
    <style>
        :root {
            --matrix-green: #00ff41;
            --alert-red: #ff3131;
            --bg-black: #000a00;
        }

        @import url('https://fonts.googleapis.com/css2?family=VT323&display=swap');

        * { box-sizing: border-box; touch-action: manipulation; }

        body, html {
            margin: 0; padding: 0;
            width: 100%; height: 100%;
            background-color: var(--bg-black);
            color: var(--matrix-green);
            font-family: 'VT323', monospace;
            overflow: hidden; /* 防止滾動 */
        }

        /* 數位雨背景 - 優化效能 */
        #canvas {
            position: fixed; top: 0; left: 0;
            width: 100%; height: 100%;
            z-index: 1;
            opacity: 0.5;
        }

        /* 掃描線與暗角 */
        .overlay {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background: linear-gradient(rgba(18, 16, 16, 0) 50%, rgba(0, 0, 0, 0.1) 50%),
                        radial-gradient(circle, transparent 40%, black 150%);
            background-size: 100% 3px, 100% 100%;
            z-index: 2; pointer-events: none;
        }

        /* 主容器 - 使用 Flex 佈局確保鍵盤彈出時自動調整 */
        .container {
            position: relative;
            z-index: 10;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            width: 100%;
            height: 100%;
            padding: 20px;
        }

        .terminal-window {
            width: 100%;
            max-width: 500px;
            background: rgba(0, 15, 0, 0.85);
            border: 1px solid var(--matrix-green);
            box-shadow: 0 0 20px rgba(0, 255, 65, 0.2);
            padding: 20px;
            border-radius: 8px;
            transition: all 0.3s ease;
        }

        .scene { display: none; }
        .active { display: block; }

        h1 { font-size: 1.8rem; margin: 0 0 15px 0; text-align: center; }
        p { font-size: 1.1rem; line-height: 1.3; margin-bottom: 15px; }

        /* 輸入區域優化 */
        .input-wrap {
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 15px;
        }

        input {
            background: rgba(0, 40, 0, 0.5);
            border: 1px solid var(--matrix-green);
            color: var(--matrix-green);
            font-family: 'VT323', monospace;
            font-size: 2rem;
            width: 100%;
            max-width: 250px;
            text-align: center;
            outline: none;
            padding: 10px;
            border-radius: 4px;
        }

        /* 手機端專用確認按鈕 */
        .submit-btn {
            background: var(--matrix-green);
            color: black;
            border: none;
            padding: 12px 30px;
            font-family: 'VT323', monospace;
            font-size: 1.3rem;
            font-weight: bold;
            cursor: pointer;
            width: 100%;
            max-width: 250px;
        }

        .submit-btn:active { transform: scale(0.95); background: #fff; }

        #boot-screen {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background: black; z-index: 1000;
            display: flex; flex-direction: column; justify-content: center; align-items: center;
            color: var(--matrix-green); text-align: center; padding: 20px;
        }

        .glitch-text { animation: blink 1s infinite; }
        @keyframes blink { 50% { opacity: 0; } }

        #log { font-size: 0.9rem; color: #888; margin-top: 15px; height: 1.2rem; }
    </style>
</head>
<body>

<canvas id="canvas"></canvas>
<div class="overlay"></div>

<div id="boot-screen" onclick="startSystem()">
    <h1 class="glitch-text">[ 系統待機中 ]</h1>
    <p>點擊螢幕以初始化神經連結</p>
</div>

<div class="container">
    <div class="terminal-window" id="window" style="display: none;">
        <div id="scene1" class="scene active">
            <h1>> 閘門授權</h1>
            <p id="t1_desc">正在請求存取權限... 請輸入通行密鑰 (1234)</p>
            <div class="input-wrap">
                <input type="tel" id="pw1" maxlength="4" placeholder="----" autocomplete="off">
                <button class="submit-btn" onclick="check1()">執行授權</button>
            </div>
        </div>

        <div id="scene2" class="scene">
            <h1 style="color: var(--alert-red);">> 核心防禦</h1>
            <p id="t2_desc">警報！偵測到高能雷射防禦網。必須手動停用協議 (2597)。</p>
            <div class="input-wrap">
                <input type="tel" id="pw2" maxlength="4" placeholder="CODE" autocomplete="off">
                <button class="submit-btn" style="background:var(--alert-red); color:white;" onclick="check2()">停用系統</button>
            </div>
        </div>

        <div id="scene3" class="scene">
            <h1 style="color: gold;">> 存取成功</h1>
            <p style="text-align: center;">目標已獲取。任務檔案傳輸完畢。</p>
            <div style="font-size: 4rem; text-align: center;">💎</div>
            <button class="submit-btn" onclick="location.reload()" style="background:white;">重置系統</button>
        </div>

        <div id="log"></div>
    </div>
</div>

<script>
    const canvas = document.getElementById('canvas');
    const ctx = canvas.getContext('2d');
    let width, height, columns, drops;

    function resize() {
        width = canvas.width = window.innerWidth;
        height = canvas.height = window.innerHeight;
        columns = Math.floor(width / 20);
        drops = new Array(columns).fill(1);
    }

    function draw() {
        ctx.fillStyle = "rgba(0, 10, 0, 0.15)";
        ctx.fillRect(0, 0, width, height);
        ctx.fillStyle = "#0f0";
        ctx.font = "15px monospace";
        for (let i = 0; i < drops.length; i++) {
            const text = String.fromCharCode(0x30A0 + Math.random() * 96);
            ctx.fillText(text, i * 20, drops[i] * 20);
            if (drops[i] * 20 > height && Math.random() > 0.975) drops[i] = 0;
            drops[i]++;
        }
    }

    function startSystem() {
        document.getElementById('boot-screen').style.display = 'none';
        document.getElementById('window').style.display = 'block';
        resize();
        setInterval(draw, 35);
    }

    function check1() {
        const p = document.getElementById('pw1');
        const l = document.getElementById('log');
        if (p.value === '1234') {
            document.getElementById('scene1').classList.remove('active');
            document.getElementById('scene2').classList.add('active');
            l.innerText = "授權成功...";
        } else {
            l.innerText = "拒絕存取";
            l.style.color = "red";
            p.value = "";
        }
    }

    function check2() {
        const p = document.getElementById('pw2');
        const l = document.getElementById('log');
        if (p.value === '2597') {
            document.getElementById('scene2').classList.remove('active');
            document.getElementById('scene3').classList.add('active');
        } else {
            l.innerText = "指令錯誤";
            l.style.color = "red";
            p.value = "";
        }
    }

    window.addEventListener('resize', resize);
    resize();
</script>
</body>
</html>
